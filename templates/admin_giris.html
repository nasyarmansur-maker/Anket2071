{% extends "base.html" %}
{% block baslik %}Yönetici Girişi{% endblock %}
{% block icerik %}
<div class="kap" style="max-width:380px;padding-top:3rem">
  <div class="kart">
    <div style="text-align:center;margin-bottom:1.5rem">
      {% if amblem %}
        <img src="{{ amblem }}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;margin-bottom:10px">
      {% else %}
        <div style="font-size:40px;margin-bottom:10px">🔐</div>
      {% endif %}
      <h2 style="font-size:18px;font-weight:700">Yönetici Girişi</h2>
      <p style="font-size:13px;color:var(--metin-ik)">{{ okul_adi }}</p>
    </div>
    {% if hata %}<div class="hata-kutu">{{ hata }}</div>{% endif %}
    <form method="POST">
      <div class="alan-grubu">
        <label class="alan-lbl">Şifre</label>
        <input type="password" name="sifre" placeholder="••••••••" autofocus>
      </div>
      <button type="submit" class="btn btn-ana btn-tam" style="margin-top:6px">Giriş Yap →</button>
    </form>
  </div>
  <p style="text-align:center;font-size:12px;color:var(--metin-uc);margin-top:10px">
    <a href="/" style="color:var(--metin-uc)">← Ana sayfaya dön</a>
  </p>
</div>
{% endblock %}
